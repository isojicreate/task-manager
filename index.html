<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理アプリ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>タスク管理アプリ</h1>
      <p>タスクを追加して、完了状態を管理できます。</p>
    </header>

    <main>
      <section class="task-form-section">
        <h2>タスクを追加</h2>

        <form id="taskForm" class="task-form">
          <input
            type="text"
            id="taskInput"
            placeholder="例：ブログ記事を書く"
            autocomplete="off"
          >
          <select id="priorityInput" aria-label="重要度">
            <option value="1">重要度 1</option>
            <option value="2">重要度 2</option>
            <option value="3" selected>重要度 3</option>
            <option value="4">重要度 4</option>
            <option value="5">重要度 5</option>
          </select>
          <input type="date" id="dueDateInput" aria-label="期限日">
          <button type="submit">追加</button>
        </form>

        <p id="errorMessage" class="error-message"></p>
      </section>

      <section class="task-list-section">
        <h2>タスク一覧</h2>
        <p id="taskCount" class="task-count"></p>

        <ul id="taskList" class="task-list">
          <!-- JavaScriptでタスクを表示します -->
        </ul>

        <p id="emptyMessage" class="empty-message">まだタスクはありません。</p>
      </section>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
